<div class="login-container">
  <h1 class="title">Welcome to ManualBalancedDB</h1>

  <div class="login-card">
    <h2>Create new account</h2>


    <!-- Registration Form -->
    <form #registerForm="ngForm" (ngSubmit)="onRegister(registerForm)">

      <label>Name</label>
      <input type="text" name="name" placeholder="Name" ngModel required />

      <label>E-mail</label>
      <input type="email" name="email" placeholder="individual@domain.com" ngModel required />

      <label>Password</label>
      <input type="password" name="password" placeholder="Password" ngModel required minlength="6" />

      <label>Confirm Password</label>
      <input type="password" name="confirmPassword" placeholder="Confirm Password" ngModel required />

      <input type = "hidden" name = "createdDate" [ngModel] = "creationDate" />

      <button type="submit" class="login-btn" [disabled]="registerForm.invalid">
        Create account
      </button>



    </form>

    <div class="links">
      <p>Already have an account? <a routerLink="/login">Sign in</a></p>
    </div>
  </div>
</div>
